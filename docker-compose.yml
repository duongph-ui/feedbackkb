services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: feedbackkb
      POSTGRES_PASSWORD: feedbackkb
      POSTGRES_DB: feedback_kb
    ports:
      - "5432:5432"
    volumes:
      - fbk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbackkb -d feedback_kb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./packages/server
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://feedbackkb:feedbackkb@db:5432/feedback_kb
    ports:
      - "8000:8000"
    command: >
      sh -c "yoyo apply --batch --database $$DATABASE_URL ./migrations &&
             uvicorn feedbackkb_server.app:app --host 0.0.0.0 --port 8000"

volumes:
  fbk_pgdata:
