name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan history for secrets (gate before publish, §6.5)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test (no live DB — DB tests self-skip)
        run: pytest

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version comes from package.json "packageManager" (pnpm@10.x); don't pin
        # it here too or action-setup errors ERR_PNPM_BAD_PM_VERSION on mismatch.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Build (no-op until packages exist)
        run: pnpm -r --if-present build
